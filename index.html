        // グローバル関数
        function updateTsunamiDisplay(activeAreas) {
            const tsunamiPanel = document.querySelector('.tsunami-warning-panel');
            const tsunamiSectionTitle = document.getElementById('tsunami-section-title');
            
            // 警報レベル別の見出し・優先度定義
            const LEVEL_META = {
                major_warning: { priority: 3, cssClass: 'major-warning', label: '大津波警報', icon: '🚨' },
                warning:       { priority: 2, cssClass: 'warning',       label: '津波警報',   icon: '⚠️' },
                advisory:      { priority: 1, cssClass: 'advisory',      label: '津波注意報', icon: '🌊' },
                forecast:      { priority: 0, cssClass: 'advisory',      label: '津波予報',   icon: '📢' }
            };

            if (activeAreas.length === 0) {
                // 津波注意報が完全に解除された場合
                if (tsunamiPanel) {
                    tsunamiPanel.style.display = 'none';
                }
                if (tsunamiSectionTitle) {
                    tsunamiSectionTitle.textContent = '✅ 津波情報なし';
                    tsunamiSectionTitle.style.color = '#4CAF50';
                }
                updateTsunamiTicker([], null);
                console.log('🚫 津波注意報完全解除: パネル非表示・タイトル変更');
            } else {
                // アクティブな地域の中から最高警報レベルを特定
                let top = LEVEL_META.advisory;
                let latestIssued = null;
                for (const f of activeAreas) {
                    const meta = LEVEL_META[f.properties.STATUS];
                    if (meta && meta.priority > top.priority) top = meta;
                    const issued = f.properties.ISSUED_AT;
                    if (issued && (!latestIssued || issued > latestIssued)) latestIssued = issued;
                }

                if (tsunamiPanel) {
                    tsunamiPanel.style.display = 'block';
                }
                if (tsunamiSectionTitle) {
                    tsunamiSectionTitle.textContent = `${top.icon} ${top.label}`;
                    tsunamiSectionTitle.style.color = '';
                }

                // ステータスバー(#tsunami-level)も実レベルに差し替え
                const levelEl = document.getElementById('tsunami-level');
                if (levelEl) {
                    levelEl.className = `tsunami-level ${top.cssClass}`;
                    const levelText = levelEl.querySelector('.level-text');
                    if (levelText) levelText.textContent = top.label;
                }
                // 発表時刻を現在時刻に更新(JST)
                const timeEl = document.querySelector('.tsunami-time');
                if (timeEl) {
                    const d = latestIssued ? new Date(latestIssued) : new Date();
                    const jst = new Date(d.getTime() + 9 * 3600000);
                    const hh = String(jst.getUTCHours()).padStart(2, '0');
                    const mm = String(jst.getUTCMinutes()).padStart(2, '0');
                    const dd = String(jst.getUTCDate()).padStart(2, '0');
                    timeEl.textContent = `発表: ${dd}日 ${hh}:${mm} JST`;
                }

                updateTsunamiTicker(activeAreas, top, latestIssued);
                console.log(`🌊 ${top.label}: ${activeAreas.length}地域`);
            }
        }

        // TV風の下部テロップ(横スクロール)を更新
        function updateTsunamiTicker(activeAreas, topMeta, latestIssued) {
            const ticker = document.getElementById('tsunami-ticker');
            const labelEl = document.getElementById('tsunami-ticker-label');
            const timeEl = document.getElementById('tsunami-ticker-time');
            const contentEl = document.getElementById('tsunami-ticker-content');
            if (!ticker || !contentEl) return;

            if (!activeAreas || activeAreas.length === 0 || !topMeta) {
                ticker.style.display = 'none';
                contentEl.innerHTML = '';
                return;
            }

            const TICKER_META = {
                major_warning: { key: 'major_warning', tag: '大津波警報', defaultWave: '10m超', defaultTime: '直ちに避難',   priority: 3 },
                warning:       { key: 'warning',       tag: '津波警報',   defaultWave: '3m',    defaultTime: '間もなく到達', priority: 2 },
                advisory:      { key: 'advisory',      tag: '津波注意報', defaultWave: '1m',    defaultTime: '既に到達と推定', priority: 1 },
                forecast:      { key: 'advisory',      tag: '津波予報',   defaultWave: '0.2m',  defaultTime: '予報',           priority: 0 }
            };
            const sorted = [...activeAreas].sort((a, b) => {
                const pa = TICKER_META[a.properties.STATUS]?.priority ?? -1;
                const pb = TICKER_META[b.properties.STATUS]?.priority ?? -1;
                return pb - pa;
            });

            // ラベル・時刻
            labelEl.textContent = `${topMeta.icon} ${topMeta.label} 発令中`;
            const d = latestIssued ? new Date(latestIssued) : new Date();
            const jst = new Date(d.getTime() + 9 * 3600000);
            const hh = String(jst.getUTCHours()).padStart(2, '0');
            const mm = String(jst.getUTCMinutes()).padStart(2, '0');
            const dd = String(jst.getUTCDate()).padStart(2, '0');
            timeEl.textContent = `発表 ${dd}日 ${hh}:${mm} JST`;

            // テロップ要素構築(innerHTML を使わず createElement で XSS 安全)
            const buildItems = () => {
                const frag = document.createDocumentFragment();
                sorted.forEach((feature, idx) => {
                    const p = feature.properties;
                    const meta = TICKER_META[p.STATUS] || TICKER_META.advisory;
                    const item = document.createElement('span');
                    item.className = `ticker-item level-${meta.key}`;

                    const tag = document.createElement('span');
                    tag.className = 'tag';
                    tag.textContent = meta.tag;
                    item.appendChild(tag);

                    const area = document.createElement('span');
                    area.className = 'area';
                    area.textContent = p.AREA_NAME || '';
                    item.appendChild(area);

                    const wave = document.createElement('span');
                    wave.className = 'wave';
                    wave.textContent = `予想高: ${p.WAVE_HEIGHT || meta.defaultWave}`;
                    item.appendChild(wave);

                    const eta = document.createElement('span');
                    eta.className = 'eta';
                    eta.textContent = p.ARRIVAL_TIME || meta.defaultTime;
                    item.appendChild(eta);

                    frag.appendChild(item);
                    if (idx < sorted.length - 1) {
                        const sep = document.createElement('span');
                        sep.className = 'sep';
                        sep.textContent = '◆';
                        frag.appendChild(sep);
                    }
                });
                return frag;
            };

            contentEl.innerHTML = '';
            contentEl.appendChild(buildItems());
            // シームレスループ用に 2 周目を連結(最後にビッグセパレータ)
            const gap = document.createElement('span');
            gap.className = 'sep';
            gap.textContent = '◆◆◆';
            contentEl.appendChild(gap);
            contentEl.appendChild(buildItems());

            // 最高レベルに応じてクラス切替(枠色が紫/赤/黄に変わる)
            ticker.className = `tsunami-ticker level-${topMeta.cssClass === 'major-warning' ? 'major_warning' : topMeta.cssClass}`;
            ticker.style.display = 'flex';
        }

        function updateTsunamiRegionsPanel(activeAreas) {
            const tsunamiRegionsContainer = document.querySelector('.tsunami-regions');
            if (!tsunamiRegionsContainer) return;

            // 警報レベル別のスタイル・優先度・デフォルト値
            const REGION_META = {
                major_warning: { priority: 3, cssClass: 'major-warning', defaultWave: '10m超', defaultTime: '直ちに避難' },
                warning:       { priority: 2, cssClass: 'warning',       defaultWave: '3m',    defaultTime: '間もなく到達' },
                advisory:      { priority: 1, cssClass: 'advisory',      defaultWave: '1m',    defaultTime: '既に到達と推定' },
                forecast:      { priority: 0, cssClass: 'advisory',      defaultWave: '0.2m',  defaultTime: '予報' }
            };

            // 優先度の高い順にソート(大津波警報 → 警報 → 注意報)
            const sorted = [...activeAreas].sort((a, b) => {
                const pa = REGION_META[a.properties.STATUS]?.priority ?? -1;
                const pb = REGION_META[b.properties.STATUS]?.priority ?? -1;
                return pb - pa;
            });

            // 既存の地域アイテムをクリア
            tsunamiRegionsContainer.innerHTML = '';

            sorted.forEach(feature => {
                const props = feature.properties;
                const meta = REGION_META[props.STATUS] || REGION_META.advisory;

                const regionItem = document.createElement('div');
                regionItem.className = `region-item ${meta.cssClass}`;

                const regionName = document.createElement('div');
                regionName.className = 'region-name';
                regionName.textContent = props.AREA_NAME || '';

                const regionInfo = document.createElement('div');
                regionInfo.className = 'region-info';

                const waveHeight = document.createElement('span');
                waveHeight.className = 'wave-height';
                waveHeight.textContent = props.WAVE_HEIGHT || meta.defaultWave;

                const arrivalTime = document.createElement('span');
                arrivalTime.className = 'arrival-time';
                arrivalTime.textContent = props.ARRIVAL_TIME || meta.defaultTime;

                regionInfo.appendChild(waveHeight);
                regionInfo.appendChild(arrivalTime);
                regionItem.appendChild(regionName);
                regionItem.appendChild(regionInfo);

                tsunamiRegionsContainer.appendChild(regionItem);
            });

            console.log(`🔄 リアルタイム監視パネル更新: ${activeAreas.length}地域表示`);
        }
        
        function selectEarthquake(id) {
            const earthquake = window.monitor.earthquakeHistory.find(eq => eq.id === id);
            if (earthquake) {
                window.monitor.updateOverlayInfo(earthquake);
                // 自動ズーム設定が有効かつ座標がある場合のみ地図を移動
                if (window.monitor.settings.autoZoom && earthquake.latitude && earthquake.longitude) {
                    window.monitor.map.setView([earthquake.latitude, earthquake.longitude], 8);
                    // 地図移動後に位置チェックを実行（ホームボタン表示のため）
                    setTimeout(() => {
                        window.monitor.checkMapPosition();
                    }, 100);
                }
                // 震度情報ポップアップを表示
                window.monitor.showIntensityPopup(earthquake);
                console.log(`📍 Selected earthquake: ${earthquake.location}`);
            }
        }

        // 本番環境用初期化完了
        console.log('✅ ProfessionalEarthquakeMonitorクラス定義完了');
    </script>
    <!-- TV風 津波警報テロップ(警報時のみ updateTsunamiTicker() で表示) -->
    <div class="tsunami-ticker" id="tsunami-ticker" aria-live="polite">
        <div class="ticker-label" id="tsunami-ticker-label"></div>
        <div class="ticker-time" id="tsunami-ticker-time"></div>
        <div class="ticker-track">
            <div class="ticker-content" id="tsunami-ticker-content"></div>
        </div>
    </div>
    <!-- セキュア初期化スクリプト（外部ファイル） -->
    <script src="main.js"></script>
</body>
</html>
